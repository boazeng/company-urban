AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Agent Company (company-urban) — dashboard + agent services

# Phase A: dashboard (static Vite/React) on S3 + CloudFront.
# Phase B: Guy's WhatsApp webhook (FastAPI via Mangum) on Lambda + DynamoDB,
#          reachable at /api/whatsapp/* via the same CloudFront/HTTP API.

Parameters:
  Stage:
    Type: String
    Default: prod
  WhatsAppPhoneNumberId:
    Type: String
    NoEcho: true
    Default: ""
  WhatsAppAccessToken:
    Type: String
    NoEcho: true
    Default: ""
  WhatsAppVerifyToken:
    Type: String
    NoEcho: true
    Default: "company-urban-verify"
  OpenAiApiKey:
    Type: String
    NoEcho: true
    Default: ""
  PriorityUrlReal:
    Type: String
    NoEcho: true
    Default: ""
  PriorityUsername:
    Type: String
    NoEcho: true
    Default: ""
  PriorityPassword:
    Type: String
    NoEcho: true
    Default: ""
  RoutingScriptId:
    Type: String
    Default: "guy-parking-service"
  CertificateArn:
    Type: String
    Description: ACM cert (us-east-1) for the custom domain
    Default: "arn:aws:acm:us-east-1:824980746386:certificate/527db2ac-6df1-4287-8bc1-3618b9ca8e59"

Resources:

  # ── S3 Bucket for the dashboard ─────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub company-urban-frontend-${Stage}

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::company-urban-frontend-${Stage}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # ── Agent output store ──────────────────────────────
  # One bucket holding every agent's deliverables, a folder (prefix) per agent:
  #   s3://company-urban-agent-output-<stage>/<agent-slug>/...
  # The research worker syncs an agent's output/<slug> dir to its prefix after a
  # run (so reports survive the ephemeral container) and pulls it back before a
  # run (so the agent can reference its own prior materials). Private — no public
  # access; reached only via the worker's task role.
  AgentOutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub company-urban-agent-output-${Stage}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── API Gateway (HTTP API) ──────────────────────────
  ApiGateway:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  # ── Guy — WhatsApp webhook Lambda (FastAPI + Mangum) ─
  GuyWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub company-urban-guy-${Stage}
      CodeUri: ./guy/
      Handler: lambda_handler.handler
      Runtime: python3.13
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          STORAGE_BACKEND: dynamodb
          BOT_SCRIPTS_TABLE: !Ref GuyScriptsTable
          TROUBLESHOOT_SESSIONS_TABLE: !Ref GuySessionsTable
          MESSAGES_TABLE: !Ref GuyMessagesTable
          SERVICE_CALLS_TABLE: !Ref GuyServiceCallsTable
          BOT_PROMPTS_TABLE: !Ref GuyPromptsTable
          ROUTING_SCRIPT_ID: !Ref RoutingScriptId
          WHATSAPP_PHONE_NUMBER_ID: !Ref WhatsAppPhoneNumberId
          WHATSAPP_ACCESS_TOKEN: !Ref WhatsAppAccessToken
          WHATSAPP_VERIFY_TOKEN: !Ref WhatsAppVerifyToken
          OPENAI_API_KEY: !Ref OpenAiApiKey
          EQUIPMENT_READER_ENABLED: "true"
          BOT_EQUIPMENT_READER_MODULE: priority_connectors.equipment_reader
          PRIORITY_URL_REAL: !Ref PriorityUrlReal
          PRIORITY_USERNAME: !Ref PriorityUsername
          PRIORITY_PASSWORD: !Ref PriorityPassword
          SERVICE_CALL_WRITER_ENABLED: "true"
          BOT_SERVICE_CALL_WRITER_MODULE: priority_connectors.service_call_writer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GuyScriptsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GuySessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GuyMessagesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GuyServiceCallsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GuyPromptsTable
      Events:
        Whatsapp:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGateway
            Path: /api/whatsapp/{proxy+}
            Method: ANY
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGateway
            Path: /api/health
            Method: GET

  # ── DynamoDB tables (Guy bot engine) ────────────────
  GuyScriptsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub company-urban-bot-scripts-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: script_id
          AttributeType: S
      KeySchema:
        - AttributeName: script_id
          KeyType: HASH

  GuySessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub company-urban-sessions-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: phone
          AttributeType: S
      KeySchema:
        - AttributeName: phone
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  GuyMessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub company-urban-messages-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: phone
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: status-created_at-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: phone-created_at-index
          KeySchema:
            - AttributeName: phone
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  GuyServiceCallsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub company-urban-service-calls-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: phone
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: status-created_at-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: phone-created_at-index
          KeySchema:
            - AttributeName: phone
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  GuyPromptsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub company-urban-prompts-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: prompt_id
          AttributeType: S
      KeySchema:
        - AttributeName: prompt_id
          KeyType: HASH

  # ── CloudFront (CDN + TLS) ──────────────────────────
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub company-urban-oac-${Stage}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Aliases:
          - company-urban.newavera.co.il
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
          - Id: ApiOrigin
            DomainName: !Sub ${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
            OriginPath: !Sub /${Stage}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          # Managed-CachingOptimized
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            # Managed-CachingDisabled + Managed-AllViewerExceptHostHeader
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
        CustomErrorResponses:
          # SPA routing — serve index.html for client-side routes
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  # ════════ Deep-research worker (Fargate per-job) ════════
  # Heavy /dafna research runs as a one-off Fargate task — isolated from the
  # small comms box, pay-per-second, no idle cost. comms triggers ecs:RunTask
  # (Phase 3); the container posts the report back over HTTPS.

  # Image registry for the worker (CI builds + pushes :latest here).
  ResearchWorkerRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub company-urban-research-worker-${Stage}
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: '{"rules":[{"rulePriority":1,"description":"keep last 5 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":5},"action":{"type":"expire"}}]}'

  # ANTHROPIC_API_KEY for the worker — created EMPTY on purpose; set the value once
  # (see deploy/research-worker/AWS-SETUP.md) so CFN never overwrites it on redeploy.
  ResearchSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub company-urban-research-anthropic-key-${Stage}
      Description: ANTHROPIC_API_KEY for the deep-research Fargate worker. Set value manually once.

  ResearchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/company-urban-research-${Stage}
      RetentionInDays: 30

  ResearchCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub company-urban-research-${Stage}

  # Minimal public-subnet VPC: a Fargate task with a public IP reaches the internet
  # directly (no NAT gateway → no hourly cost). Egress-only SG, no ingress.
  ResearchVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub company-urban-research-${Stage}

  ResearchIgw:
    Type: AWS::EC2::InternetGateway

  ResearchIgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref ResearchVpc
      InternetGatewayId: !Ref ResearchIgw

  ResearchSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ResearchVpc
      CidrBlock: 10.42.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs ""]

  ResearchRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ResearchVpc

  ResearchDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: ResearchIgwAttach
    Properties:
      RouteTableId: !Ref ResearchRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref ResearchIgw

  ResearchSubnetRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref ResearchSubnet
      RouteTableId: !Ref ResearchRouteTable

  ResearchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Egress-only SG for the deep-research Fargate worker
      VpcId: !Ref ResearchVpc
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0

  # Pulls the image, writes logs, reads the ANTHROPIC_API_KEY secret.
  ResearchExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: read-anthropic-secret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref ResearchSecret

  # The container's own role — calls Claude + posts back over HTTPS, and syncs the
  # agent's deliverables to/from its prefix in the agent-output bucket.
  ResearchTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: agent-output-rw
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt AgentOutputBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub ${AgentOutputBucket.Arn}/*
              # Publish the human-readable HTML under reports/ in the dashboard
              # bucket, so it's served (clickable) via the existing CloudFront.
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub ${FrontendBucket.Arn}/reports/*

  ResearchTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub company-urban-research-${Stage}
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: "2048"      # 2 vCPU
      Memory: "8192"   # 8 GB — headroom so deep research never OOMs
      ExecutionRoleArn: !GetAtt ResearchExecutionRole.Arn
      TaskRoleArn: !GetAtt ResearchTaskRole.Arn
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        - Name: research
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/company-urban-research-worker-${Stage}:latest
          Essential: true
          Environment:
            # Where the worker syncs the agent's deliverables (prefix per agent).
            - Name: AGENT_OUTPUT_BUCKET
              Value: !Ref AgentOutputBucket
            # Dashboard bucket + public base — the worker publishes a readable HTML
            # under reports/<slug>/ and posts a clickable CloudFront link to the room.
            - Name: REPORTS_BUCKET
              Value: !Ref FrontendBucket
            - Name: REPORTS_PUBLIC_BASE
              Value: https://company-urban.newavera.co.il
          Secrets:
            - Name: ANTHROPIC_API_KEY
              ValueFrom: !Ref ResearchSecret
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ResearchLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: research

Outputs:
  CloudFrontUrl:
    Description: Dashboard URL (CloudFront)
    Value: !Sub https://${CloudFrontDistribution.DomainName}
  CloudFrontDistributionId:
    Description: CloudFront distribution ID (for cache invalidation)
    Value: !Ref CloudFrontDistribution
  FrontendBucketName:
    Description: S3 bucket holding the built dashboard
    Value: !Ref FrontendBucket
  ApiUrl:
    Description: HTTP API base URL
    Value: !Sub https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
  GuyWebhookUrl:
    Description: WhatsApp webhook URL for Guy (configure in Meta)
    Value: !Sub https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/api/whatsapp/webhook

  # ── Deep-research worker (Phase 3 / comms RunTask needs these) ──
  ResearchEcrRepoUri:
    Description: ECR repo URI to push the worker image to (CI uses this)
    Value: !GetAtt ResearchWorkerRepo.RepositoryUri
  ResearchClusterArn:
    Description: ECS cluster for research tasks
    Value: !GetAtt ResearchCluster.Arn
  ResearchTaskDefinitionArn:
    Description: Fargate task definition for a deep-research run
    Value: !Ref ResearchTaskDefinition
  ResearchSubnetId:
    Description: Public subnet to launch the task in (assignPublicIp=ENABLED)
    Value: !Ref ResearchSubnet
  ResearchSecurityGroupId:
    Description: Security group for the task
    Value: !GetAtt ResearchSecurityGroup.GroupId
  ResearchSecretArn:
    Description: Secrets Manager ARN for ANTHROPIC_API_KEY (set its value once)
    Value: !Ref ResearchSecret
  AgentOutputBucketName:
    Description: Bucket holding every agent's deliverables (prefix per agent)
    Value: !Ref AgentOutputBucket
