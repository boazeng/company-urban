name: Deploy to AWS

on:
  push:
    branches: [main]

permissions:
  id-token: write   # for AWS OIDC federation (no long-lived keys)
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: company-urban-stack
  STAGE: prod

jobs:
  deploy:
    name: Deploy dashboard + services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # ── Build + deploy infra (Lambda built on Linux → correct wheels) ──
      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --parameter-overrides \
              Stage=${{ env.STAGE }} \
              WhatsAppPhoneNumberId="${{ secrets.WHATSAPP_PHONE_NUMBER_ID || 'not-configured' }}" \
              WhatsAppAccessToken="${{ secrets.WHATSAPP_ACCESS_TOKEN || 'not-configured' }}" \
              WhatsAppVerifyToken="${{ secrets.WHATSAPP_VERIFY_TOKEN || 'company-urban-verify' }}" \
              OpenAiApiKey="${{ secrets.OPENAI_API_KEY || 'not-configured' }}" \
              RoutingScriptId="guy-parking-service"

      # ── Build the dashboard (Vite bakes in the vault markdown) ──
      - name: Build dashboard
        run: |
          cd website
          npm ci
          npm run build

      # ── Upload to S3 ────────────────────────────────────
      - name: Deploy dashboard to S3
        run: |
          aws s3 sync website/dist/ s3://company-urban-frontend-${{ env.STAGE }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          aws s3 cp website/dist/index.html \
            s3://company-urban-frontend-${{ env.STAGE }}/index.html \
            --cache-control "public, max-age=0, must-revalidate"

      # ── Invalidate CloudFront cache ─────────────────────
      - name: Invalidate CloudFront
        run: |
          CF_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id "$CF_ID" \
            --paths "/*"
